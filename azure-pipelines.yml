trigger:
  branches:
    include:
      - master
      - feature/*

pool:
  vmImage: 'ubuntu-20.04'

stages:
  - stage: build
    jobs:
      - job: build
        steps:
          - task: NodeTool@0
            displayName: 'use node 14'
            inputs:
              versionSpec: 14.x
              checkLatest: true

          - checkout: self
            displayName: 'checkout'

          - task: Npm@1
            displayName: 'npm ci'
            inputs:
              command: custom
              verbose: false
              customCommand: 'ci --only=prod'

          - task: Npm@1
            displayName: 'npm build'
            inputs:
              command: custom
              verbose: false
              customCommand: 'run build'

          - task: ArchiveFiles@2
            displayName: 'archive build'
            inputs:
              rootFolderOrFile: '$(Build.SourcesDirectory)/build'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'

          - publish: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
            artifact: drop
            displayName: 'publish artifact wla'

  - stage: deploy
    dependsOn: build
    jobs:
      - deployment: dev
        displayName: 'dev.example.com'
        environment: WebsitesApp-Dev.WebsitesApp-Dev
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop
                  patterns: '$(Build.BuildId).zip'
                  displayName: 'download artifact wla'

                - task: IISWebAppDeploymentOnMachineGroup@0
                  inputs:
                    webSiteName: 'dev.example.com'
                    package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'

      - deployment: prod
        displayName: 'prod.example.com'
        environment: WebsitesApp-Dev.WebsitesApp-Dev
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop
                  patterns: '$(Build.BuildId).zip'
                  displayName: 'download artifact wla'

                - task: IISWebAppDeploymentOnMachineGroup@0
                  inputs:
                    webSiteName: 'prod.example.com'
                    package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
