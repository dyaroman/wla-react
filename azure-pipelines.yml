variables:
  - name: IsMasterBranch
    value: ${{ startsWith(variables['build.sourceBranch'], 'refs/heads/master') }}

trigger:
  branches:
    include:
      - master
      - development
      - feature/*

pool:
  vmImage: 'ubuntu-24.04'

stages:
  - stage: Build
    jobs:
      - job: Build
        steps:
          - task: NodeTool@0
            displayName: 'Use node 22.14.x'
            inputs:
              versionSpec: 22.14.x
              checkLatest: true

          - checkout: self
            displayName: 'Checkout'

          - script: rm -f .env.production
            displayName: 'Remove .env.production'
            condition: |
              and(
                succeeded(),
                eq(variables['IsMasterBranch'], false)
              )

          - script: npm pkg delete scripts.prepare
            displayName: 'Remove prepare script'

          - script: npm ci --omit=dev
            displayName: 'Install dependencies'

          - script: npm run build
            displayName: 'Build'

          - task: ArchiveFiles@2
            displayName: 'Archive build'
            inputs:
              rootFolderOrFile: '$(Build.SourcesDirectory)/build'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'

          - publish: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
            artifact: drop
            displayName: 'Publish artifact'

  - stage: Deploy
    dependsOn: Build
    jobs:
      - deployment: rc
        displayName: 'Release to rc.example.com'
        condition: |
          and(
            succeeded(),
            eq(variables['IsMasterBranch'], false)
          )
        environment: WebsitesApp-Dev.WebsitesApp-Dev
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop
                  patterns: '$(Build.BuildId).zip'
                  displayName: 'Download artifact wla'

                - task: IISWebAppDeploymentOnMachineGroup@0
                  inputs:
                    webSiteName: 'rc.example.com'
                    package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'

      - deployment: dev
        displayName: 'Release to dev.example.com'
        condition: |
          and(
            succeeded(),
            eq(variables['IsMasterBranch'], true)
          )
        environment: WebsitesApp-Dev.WebsitesApp-Dev
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop
                  patterns: '$(Build.BuildId).zip'
                  displayName: 'Download artifact wla'

                - task: IISWebAppDeploymentOnMachineGroup@0
                  inputs:
                    webSiteName: 'dev.example.com'
                    package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'

      - deployment: prod
        displayName: 'Release to prod.example.com'
        condition: |
          and(
            succeeded(),
            eq(variables['IsMasterBranch'], true)
          )
        environment: WebsitesApp-Dev.WebsitesApp-Dev
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop
                  patterns: '$(Build.BuildId).zip'
                  displayName: 'Download artifact wla'

                - task: IISWebAppDeploymentOnMachineGroup@0
                  inputs:
                    webSiteName: 'prod.example.com'
                    package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
