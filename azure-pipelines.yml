trigger:
  branches:
    include:
      - master

pool:
  name: BUILD-0
  demands: npm

steps:
  - task: NodeTool@0
    displayName: "use node 14"
    inputs:
      versionSpec: 14.x
      checkLatest: true

  - checkout: self
    displayName: "checkout"

  - task: Npm@1
    displayName: "npm ci"
    inputs:
      command: custom
      verbose: false
      customCommand: "ci --only=prod --registry http://localhost:4873/"

  - task: Npm@1
    displayName: "npm build"
    inputs:
      command: custom
      verbose: false
      customCommand: "run build"

  - task: ArchiveFiles@2
    displayName: "archive folder build"
    inputs:
      rootFolderOrFile: 'build\'
      includeRootFolder: false

  - task: PublishBuildArtifacts@1
    displayName: "publish artifact"
    inputs:
      pathToPublish: "$(Build.ArtifactStagingDirectory)"
