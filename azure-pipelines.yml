trigger:
  branches:
    include:
      - master
      - feature/*

pool:
  vmImage: 'ubuntu-20.04'

stages:
  - stage: Build
    jobs:
      - job: Build
        steps:
          - task: NodeTool@0
            displayName: 'Use node 18.16.x'
            inputs:
              versionSpec: 18.16.x
              checkLatest: true

          - checkout: self
            displayName: 'Checkout'

          - powershell: npm pkg delete scripts.prepare
            displayName: 'Remove prepare script'

          - task: Npm@1
            displayName: 'Install dependencies'
            inputs:
              command: custom
              verbose: false
              customCommand: 'ci --omit=dev'

          - task: Npm@1
            displayName: 'Build'
            inputs:
              command: custom
              verbose: false
              customCommand: 'run build'

          - task: ArchiveFiles@2
            displayName: 'Archive build'
            inputs:
              rootFolderOrFile: '$(Build.SourcesDirectory)/build'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'

          - publish: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
            artifact: drop
            displayName: 'Publish artifact'

  - stage: Deploy
    dependsOn: Build
    jobs:
      - deployment: dev
        displayName: 'Release to dev.example.com'
        environment: WebsitesApp-Dev.WebsitesApp-Dev
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop
                  patterns: '$(Build.BuildId).zip'
                  displayName: 'Download artifact wla'

                - task: IISWebAppDeploymentOnMachineGroup@0
                  inputs:
                    webSiteName: 'dev.example.com'
                    package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'

      - deployment: prod
        displayName: 'Release to prod.example.com'
        environment: WebsitesApp-Dev.WebsitesApp-Dev
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop
                  patterns: '$(Build.BuildId).zip'
                  displayName: 'Download artifact wla'

                - task: IISWebAppDeploymentOnMachineGroup@0
                  inputs:
                    webSiteName: 'prod.example.com'
                    package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
