trigger:
  branches:
    include:
      - master

pool:
  name: BUILD-0
  demands: npm

steps:
  - task: NodeTool@0
    displayName: 'use node 14'
    inputs:
      versionSpec: 14.x
      checkLatest: true

  - checkout: self
    displayName: '[app]: checkout'

  - task: Npm@1
    displayName: '[app]: npm ci'
    inputs:
      command: custom
      verbose: false
      customCommand: 'ci --production --registry http://localhost:4873/'

  - task: Npm@1
    displayName: '[app]: npm build'
    inputs:
      command: custom
      verbose: false
      customCommand: 'run build'

  - task: ArchiveFiles@2
    displayName: 'Archive folder build'
    inputs:
      rootFolderOrFile: 'build\'
      includeRootFolder: false

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Artifact'
    inputs:
      pathToPublish: '$(Build.ArtifactStagingDirectory)'
