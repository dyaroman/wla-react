trigger:
  branches:
    include:
      - master

pool:
  name: BUILD-0
  demands: npm

resources:
  repositories:
    - repository: ui-tests
      name: Websites App/ui-tests
      type: git

steps:
  - task: NodeTool@0
    displayName: 'use node 14'
    inputs:
      versionSpec: 14.x
      checkLatest: true

  - checkout: self
    displayName: '[app]: checkout'

  - task: Npm@1
    displayName: '[app]: npm ci'
    inputs:
      command: custom
      verbose: false
      workingDir: websites-list-app
      customCommand: 'ci --production --registry http://localhost:4873/'

  - task: Npm@1
    displayName: '[app]: npm build'
    inputs:
      command: custom
      verbose: false
      workingDir: websites-list-app
      customCommand: 'run build'

  - checkout: ui-tests
    displayName: '[tests]: checkout'

  - task: Npm@1
    displayName: '[tests]: npm ci'
    inputs:
      command: custom
      verbose: false
      workingDir: ui-tests
      customCommand: 'ci --production --registry http://localhost:4873/'

  - script: npx serve -s build
    displayName: '[app]: npx serve'
    workingDirectory: ui-tests

  - task: Npm@1
    displayName: '[tests]: run local tests'
    inputs:
      command: custom
      verbose: false
      workingDir: ui-tests
      customCommand: 'run codeceptjs:local:headless'

  - task: ArchiveFiles@2
    displayName: 'Archive folder build'
    inputs:
      rootFolderOrFile: 'websites-list-app\build\'
      includeRootFolder: false

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Artifact'
    inputs:
      pathToPublish: '$(Build.ArtifactStagingDirectory)'
